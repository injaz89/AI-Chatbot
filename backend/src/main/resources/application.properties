# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── DataSource ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/study_assistant?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── Connection Pool (HikariCP defaults) ─────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Keep FK constraints in sync when ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# ─── File Upload (for PDF ingestion) ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.ai.studyassistant=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
